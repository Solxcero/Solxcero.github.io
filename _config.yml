# Setup
title: Memento Hora
description: One Source Multi Use
url: https://solxcero.github.io/
avatar: /avatar.jpeg
paginate: 5
permalink: pretty
cover_image: /pic.png
# Gems
plugins:
  - jekyll-gist
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-feed
  - jekyll-sitemap

# Optimize Jekyll
exclude:
  - .editorconfig
  - .git
  - .jekyll-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - scripts/
  - not-pure-poole.gemspec

